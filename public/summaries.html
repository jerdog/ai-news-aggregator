<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Summaries — AI News Aggregator</title>
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a30;
      --text: #e4e4e7;
      --muted: #a1a1aa;
      --accent: #a78bfa;
      --accent-hover: #c4b5fd;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1.5rem;
      line-height: 1.6;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.5rem 0; }
    .nav { margin-bottom: 1.5rem; font-size: 0.875rem; }
    .nav a { color: var(--muted); text-decoration: none; }
    .nav a:hover { color: var(--accent); }
    section { margin-bottom: 2.5rem; }
    .period-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .period-key { font-size: 1rem; color: var(--muted); margin-bottom: 0.75rem; }
    .summary-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-size: 0.9375rem;
    }
    .summary-body p { margin: 0 0 0.75rem 0; }
    .summary-body p:last-child { margin-bottom: 0; }
    .summary-body a { color: var(--accent); text-decoration: none; }
    .summary-body a:hover { text-decoration: underline; }
    .loading, .error { padding: 2rem; text-align: center; color: var(--muted); }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <h1>AI Summaries</h1>
  <p class="nav"><a href="/">← Back to article list</a></p>
  <p class="nav" style="color: var(--muted); font-size: 0.875rem;">Generated by Cloudflare Workers AI (Gemma 3 12B) from articles in each period. New day/week/month summaries appear as the cron runs.</p>
  <div id="root">Loading…</div>

  <script>
    const root = document.getElementById('root');

    function escapeHtml(str) {
      if (str == null) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function escapeAttr(str) {
      return escapeHtml(str).replace(/"/g, '&quot;');
    }

    /** Simple markdown: [text](url) → link, \n\n → paragraph. */
    function mdToHtml(md) {
      if (!md || !md.trim()) return '';
      const tokens = [];
      let tokenId = 0;
      const linkRe = /\[([^\]]+)\]\(([^)]+)\)/g;
      const withTokens = md.replace(linkRe, (_, text, url) => {
        tokens.push({ text, url });
        return '\x00' + (tokenId++) + '\x00';
      });
      const paras = withTokens.split(/\n\n+/);
      const out = paras.map((p) => {
        const escaped = escapeHtml(p.trim()).replace(/\x00(\d+)\x00/g, (_, i) => {
          const t = tokens[Number(i)];
          return '<a href="' + escapeAttr(t.url) + '" target="_blank" rel="noopener">' + escapeHtml(t.text) + '</a>';
        });
        return '<p>' + escaped + '</p>';
      }).join('');
      return out;
    }

    function formatPeriodKey(type, key) {
      if (type === 'day') return key;
      if (type === 'week') return 'Week of ' + key;
      if (type === 'month') {
        const [y, m] = key.split('-');
        const names = ['', 'January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        return names[parseInt(m, 10)] + ' ' + y;
      }
      return key;
    }

    async function load() {
      try {
        const res = await fetch('/api/summaries');
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        const summaries = data.summaries ?? [];
        const byType = { day: [], week: [], month: [] };
        for (const s of summaries) {
          if (byType[s.period_type]) byType[s.period_type].push(s);
        }
        const order = ['day', 'week', 'month'];
        let html = '';
        for (const type of order) {
          const list = byType[type];
          if (list.length === 0) continue;
          html += '<section><div class="period-label">' + escapeHtml(type) + '</div>';
          for (const s of list) {
            html += '<div class="period-key">' + escapeHtml(formatPeriodKey(type, s.period_key)) + '</div>';
            html += '<div class="summary-body">' + mdToHtml(s.content) + '</div>';
          }
          html += '</section>';
        }
        if (!html) html = '<p class="loading">No summaries yet. They are generated daily by the cron job (yesterday’s day, last week on Sundays, last month on the 1st).</p>';
        root.innerHTML = html;
      } catch (e) {
        root.innerHTML = '<p class="error">Failed to load: ' + escapeHtml(e.message) + '</p>';
      }
    }

    load();
  </script>
</body>
</html>
